version: '3'

services:
  vbox-testmgr-db:
    image: postgres:alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - vbox-testmgr-db:/var/lib/postgresql/data
    env_file:
      - vbox-testmgr-db.env

  vbox-testmgr-web:
    image: vbox-testmgr:dev
    restart: unless-stopped
    ports:
      - 8080:80
    links:
      - "vbox-testmgr-db:database"
    env_file:
      - vbox-testmgr-db.env
    volumes:
      - ${VBOX_TESTMGR_DATA}:/vbox
    depends_on:
      - vbox-testmgr-db

volumes:
  vbox-testmgr-db:
  vbox-testmgr-web:
